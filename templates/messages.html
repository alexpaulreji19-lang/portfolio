<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Messages — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 2rem; }
    h1   { color: #c8f06a; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; }
    th   { text-align: left; padding: .6rem 1rem; background: #1a1a1a; color: #c8f06a; font-size: .85rem; text-transform: uppercase; letter-spacing: .05em; }
    td   { padding: .75rem 1rem; border-bottom: 1px solid #222; font-size: .95rem; vertical-align: top; }
    tr:hover td { background: #161616; }
    .back { display: inline-block; margin-bottom: 1.5rem; color: #c8f06a; text-decoration: none; font-size: .9rem; }
    .back:hover { text-decoration: underline; }
    .empty { color: #555; padding: 2rem; text-align: center; }
  </style>
</head>
<body>
  <a href="/" class="back">← Back to portfolio</a>
  <h1>Submitted messages</h1>

  {% if messages %}
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody>
      {% for m in messages %}
      <tr>
        <td>{{ m['id'] }}</td>
        <td>{{ m['name'] }}</td>
        <td>{{ m['email'] }}</td>
        <td>{{ m['message'] }}</td>
        <td>{{ m['created_at'] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p class="empty">No messages yet. Submit the contact form to see them here.</p>
  {% endif %}
</body>
</html>
